<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video to SRT & Khmer TTS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kantumruy+Pro:wght@300;400;700&display=swap');
        body {
            font-family: 'Kantumruy Pro', sans-serif;
            background-color: #f3f4f6;
        }
        .loading-spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #3498db;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 2s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-4xl mx-auto bg-white rounded-xl shadow-lg overflow-hidden">
        <!-- Header -->
        <div class="bg-blue-600 p-6 text-white text-center">
            <h1 class="text-2xl font-bold">កម្មវិធីបំប្លែងវីដេអូទៅជា SRT និងសំឡេងខ្មែរ</h1>
            <p class="text-sm opacity-90">បញ្ចូលវីដេអូ ដើម្បីទាញយកអត្ថបទ បកប្រែ និងបង្កើតសំឡេងអាន</p>
        </div>

        <div class="p-6 space-y-8">
            <!-- Step 1: Video Upload & Processing -->
            <section class="space-y-4">
                <h2 class="text-lg font-semibold border-b pb-2">១. បញ្ចូលវីដេអូ និងទាញយកអត្ថបទ (Video to Text)</h2>
                <div class="flex flex-col space-y-2">
                    <input type="file" id="videoInput" accept="video/*" class="block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100 cursor-pointer"/>
                    <button id="processVideoBtn" class="bg-blue-600 text-white py-2 px-6 rounded-lg font-medium hover:bg-blue-700 transition disabled:bg-gray-400">
                        ចាប់ផ្តើមដំណើរការវិភាគវីដេអូ
                    </button>
                </div>
                <div id="videoLoading" class="hidden flex items-center space-x-2 text-blue-600">
                    <div class="loading-spinner"></div>
                    <span>កំពុងវិភាគវីដេអូ (សូមរង់ចាំ...)</span>
                </div>
            </section>

            <!-- Step 2: Editor & Translation -->
            <section class="space-y-4">
                <h2 class="text-lg font-semibold border-b pb-2">២. អត្ថបទ (SRT/Text) និងការបកប្រែ</h2>
                <textarea id="srtOutput" rows="8" class="w-full p-4 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none text-sm font-mono" placeholder="អត្ថបទដែលទាញចេញពីវីដេអូនឹងបង្ហាញនៅទីនេះ..."></textarea>
                
                <div class="flex flex-wrap gap-2">
                    <button id="translateBtn" class="bg-green-600 text-white py-2 px-4 rounded-lg hover:bg-green-700 transition">បកប្រែជាភាសាខ្មែរ</button>
                    <button id="downloadSrtBtn" class="bg-gray-200 text-gray-800 py-2 px-4 rounded-lg hover:bg-gray-300 transition">ទាញយកឯកសារ .SRT</button>
                </div>
            </section>

            <!-- Step 3: Text to Speech -->
            <section class="space-y-4">
                <h2 class="text-lg font-semibold border-b pb-2">៣. ប្តូរអត្ថបទទៅជាសំឡេង (Text-to-Speech)</h2>
                <div class="flex items-center space-x-4">
                    <label class="flex items-center cursor-pointer">
                        <input type="radio" name="voice" value="Puck" checked class="mr-2"> សំឡេងបុរស (Puck)
                    </label>
                    <label class="flex items-center cursor-pointer">
                        <input type="radio" name="voice" value="Kore" class="mr-2"> សំឡេងស្ត្រី (Kore)
                    </label>
                </div>
                <button id="generateAudioBtn" class="bg-purple-600 text-white py-3 px-8 rounded-lg font-bold hover:bg-purple-700 transition w-full">
                    បង្កើតសំឡេងអាន (Generate Audio)
                </button>
                
                <div id="audioContainer" class="hidden mt-4 p-4 bg-gray-50 rounded-lg border flex flex-col items-center">
                    <p class="mb-2 text-sm text-gray-600">សំឡេងរបស់អ្នករួចរាល់ហើយ៖</p>
                    <audio id="audioPlayer" controls class="w-full"></audio>
                </div>
            </section>
        </div>
    </div>

    <script type="module">
        const apiKey = ""; // API Key នឹងត្រូវបញ្ចូលដោយប្រព័ន្ធស្វ័យប្រវត្តិ
        const modelName = "gemini-2.5-flash-preview-09-2025";
        const ttsModelName = "gemini-2.5-flash-preview-tts";

        // Element selection
        const videoInput = document.getElementById('videoInput');
        const processVideoBtn = document.getElementById('processVideoBtn');
        const videoLoading = document.getElementById('videoLoading');
        const srtOutput = document.getElementById('srtOutput');
        const translateBtn = document.getElementById('translateBtn');
        const downloadSrtBtn = document.getElementById('downloadSrtBtn');
        const generateAudioBtn = document.getElementById('generateAudioBtn');
        const audioPlayer = document.getElementById('audioPlayer');
        const audioContainer = document.getElementById('audioContainer');

        // Helper: Exponential Backoff for API calls
        async function fetchWithRetry(url, options, maxRetries = 5) {
            for (let i = 0; i < maxRetries; i++) {
                try {
                    const response = await fetch(url, options);
                    if (response.ok) return await response.json();
                    if (response.status !== 429 && response.status < 500) break;
                } catch (e) {}
                await new Promise(r => setTimeout(r, Math.pow(2, i) * 1000));
            }
            throw new Error("ការហៅទៅកាន់ API បរាជ័យបន្ទាប់ពីការព្យាយាមច្រើនដង។");
        }

        // 1. Process Video to SRT
        processVideoBtn.onclick = async () => {
            const file = videoInput.files[0];
            if (!file) {
                alert("សូមជ្រើសរើសឯកសារវីដេអូសិន!");
                return;
            }

            videoLoading.classList.remove('hidden');
            processVideoBtn.disabled = true;

            try {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = async () => {
                    const base64Data = reader.result.split(',')[1];
                    const payload = {
                        contents: [{
                            parts: [
                                { text: "Please transcribe this video and provide the output in SRT format with timestamps. If there is speech, identify the language and transcribe it accurately." },
                                { inlineData: { mimeType: file.type, data: base64Data } }
                            ]
                        }]
                    };

                    const result = await fetchWithRetry(`https://generativelanguage.googleapis.com/v1beta/models/${modelName}:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        body: JSON.stringify(payload)
                    });

                    const text = result.candidates?.[0]?.content?.parts?.[0]?.text;
                    srtOutput.value = text || "មិនអាចទាញយកអត្ថបទបានទេ។";
                    videoLoading.classList.add('hidden');
                    processVideoBtn.disabled = false;
                };
            } catch (error) {
                alert("Error: " + error.message);
                videoLoading.classList.add('hidden');
                processVideoBtn.disabled = false;
            }
        };

        // 2. Translate Text to Khmer
        translateBtn.onclick = async () => {
            const currentText = srtOutput.value;
            if (!currentText) return;

            translateBtn.innerText = "កំពុងបកប្រែ...";
            translateBtn.disabled = true;

            try {
                const payload = {
                    contents: [{
                        parts: [{ text: `Translate the following SRT/Text content into Khmer language while keeping the SRT format structure: \n\n ${currentText}` }]
                    }]
                };

                const result = await fetchWithRetry(`https://generativelanguage.googleapis.com/v1beta/models/${modelName}:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    body: JSON.stringify(payload)
                });

                srtOutput.value = result.candidates?.[0]?.content?.parts?.[0]?.text;
            } catch (error) {
                alert("ការបកប្រែមានបញ្ហា!");
            } finally {
                translateBtn.innerText = "បកប្រែជាភាសាខ្មែរ";
                translateBtn.disabled = false;
            }
        };

        // 3. Text to Speech (Khmer)
        generateAudioBtn.onclick = async () => {
            const textToSpeak = srtOutput.value.replace(/(\d{2}:\d{2}:\d{2},\d{3} --> \d{2}:\d{2}:\d{2},\d{3})/g, '').trim();
            if (!textToSpeak) {
                alert("សូមបញ្ចូលអត្ថបទសម្រាប់អាន!");
                return;
            }

            const voiceName = document.querySelector('input[name="voice"]:checked').value;
            generateAudioBtn.innerText = "កំពុងបង្កើតសំឡេង...";
            generateAudioBtn.disabled = true;

            try {
                const payload = {
                    contents: [{ parts: [{ text: textToSpeak }] }],
                    generationConfig: {
                        responseModalities: ["AUDIO"],
                        speechConfig: {
                            voiceConfig: {
                                prebuiltVoiceConfig: { voiceName: voiceName }
                            }
                        }
                    }
                };

                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${ttsModelName}:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const result = await response.json();
                const pcmDataB64 = result.candidates?.[0]?.content?.parts?.[0]?.inlineData?.data;

                if (pcmDataB64) {
                    // Convert PCM to WAV for playback
                    const wavBlob = pcmToWav(pcmDataB64, 24000); // Assuming 24kHz sample rate
                    const audioUrl = URL.createObjectURL(wavBlob);
                    audioPlayer.src = audioUrl;
                    audioContainer.classList.remove('hidden');
                    audioPlayer.play();
                } else {
                    throw new Error("No audio data received.");
                }
            } catch (error) {
                alert("មានបញ្ហាក្នុងការបង្កើតសំឡេង!");
                console.error(error);
            } finally {
                generateAudioBtn.innerText = "បង្កើតសំឡេងអាន (Generate Audio)";
                generateAudioBtn.disabled = false;
            }
        };

        // Download SRT helper
        downloadSrtBtn.onclick = () => {
            const blob = new Blob([srtOutput.value], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'subtitle_khmer.srt';
            a.click();
        };

        // PCM to WAV Conversion Utility
        function pcmToWav(base64Pcm, sampleRate) {
            const pcmData = Uint8Array.from(atob(base64Pcm), c => c.charCodeAt(0));
            const wavHeader = new ArrayBuffer(44);
            const view = new DataView(wavHeader);

            view.setUint32(0, 0x52494646, false); // "RIFF"
            view.setUint32(4, 36 + pcmData.length, true);
            view.setUint32(8, 0x57415645, false); // "WAVE"
            view.setUint32(12, 0x666d7420, false); // "fmt "
            view.setUint32(16, 16, true);
            view.setUint16(20, 1, true); // PCM format
            view.setUint16(22, 1, true); // Mono
            view.setUint32(24, sampleRate, true);
            view.setUint32(28, sampleRate * 2, true);
            view.setUint16(32, 2, true);
            view.setUint16(34, 16, true);
            view.setUint32(36, 0x64617461, false); // "data"
            view.setUint32(40, pcmData.length, true);

            const blob = new Blob([wavHeader, pcmData], { type: 'audio/wav' });
            return blob;
        }
    </script>
</body>
</html>
