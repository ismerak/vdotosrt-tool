<!DOCTYPE html>
<html lang="km">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Khmer AI Voice Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kantumruy+Pro:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Kantumruy Pro', sans-serif;
        }

        .glass {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
        }
    </style>
</head>

<body class="bg-slate-50 min-h-screen">

    <div class="max-w-3xl mx-auto px-4 py-12">
        <div class="text-center mb-10">
            <h1 class="text-4xl font-bold text-blue-800 mb-2">Khmer AI Voice</h1>
            <p class="text-gray-600 italic">បច្ចេកវិទ្យាបញ្ចេញសំឡេងខ្មែរដ៏ឆ្លាតវៃ</p>
        </div>

        <div class="glass border border-white shadow-xl rounded-3xl p-8 mb-6">
            <!-- Input Text -->
            <div class="mb-6">
                <label class="block text-gray-700 font-bold mb-2">បញ្ចូលអត្ថបទរបស់អ្នក</label>
                <textarea id="textInput" rows="5"
                    class="w-full p-4 border border-gray-200 rounded-2xl focus:ring-2 focus:ring-blue-400 outline-none transition"
                    placeholder="សូមសរសេរអ្វីមួយនៅទីនេះ..."></textarea>
            </div>

            <!-- Voice Selection -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
                <div>
                    <label class="block text-gray-700 font-bold mb-2">ជ្រើសរើសសំឡេង</label>
                    <select id="voiceSelect" class="w-full p-3 border border-gray-200 rounded-xl bg-white">
                        <option value="Kore">សំឡេងប្រុស (Kore - ទឹកដមធម្មតា)</option>
                        <option value="Aoede">សំឡេងស្រី (Aoede - រស់រវើក)</option>
                        <option value="Charon">សំឡេងប្រុស (Charon - ជ្រៅ)</option>
                        <option value="Leda">សំឡេងស្រី (Leda - ទន់ភ្លន់)</option>
                    </select>
                </div>
                <div>
                    <label class="block text-gray-700 font-bold mb-2">ល្បឿននិយាយ</label>
                    <select id="speedSelect" class="w-full p-3 border border-gray-200 rounded-xl bg-white">
                        <option value="normal">ធម្មតា</option>
                        <option value="slow">យឺត</option>
                        <option value="fast">លឿន</option>
                    </select>
                </div>
            </div>

            <!-- Generate Button -->
            <button id="generateBtn"
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-2xl transition duration-300 shadow-lg flex justify-center items-center">
                <span id="btnText">បង្កើតសំឡេង</span>
                <div id="loader"
                    class="hidden ml-3 animate-spin h-5 w-5 border-2 border-white border-t-transparent rounded-full">
                </div>
            </button>

            <!-- Audio Player Section -->
            <div id="audioSection" class="hidden mt-8 p-6 bg-blue-50 rounded-2xl border border-blue-100">
                <p class="text-blue-800 font-bold mb-3">លទ្ធផលសំឡេង៖</p>
                <audio id="audioPlayer" controls class="w-full mb-4"></audio>
                <button onclick="downloadAudio()" class="text-sm text-blue-600 font-medium hover:underline">
                    ទាញយកជាឯកសារ MP3/WAV
                </button>
            </div>
        </div>

        <!-- Error Message -->
        <div id="errorBox" class="hidden bg-red-100 text-red-700 p-4 rounded-xl mb-6"></div>

        <div class="text-center text-gray-400 text-sm">
            &copy; 2024 Khmer AI Voice. រក្សាសិទ្ធិដោយ Gemini API.
        </div>
    </div>

    <script>
        const apiKey = "AIzaSyD7e83GoJyPiDoU2u7vho1EFrSS_ZILDVk"; // API Key នឹងត្រូវផ្តល់ដោយស្វ័យប្រវត្តិក្នុង runtime
        const textInput = document.getElementById('textInput');
        const voiceSelect = document.getElementById('voiceSelect');
        const speedSelect = document.getElementById('speedSelect');
        const generateBtn = document.getElementById('generateBtn');
        const loader = document.getElementById('loader');
        const btnText = document.getElementById('btnText');
        const audioSection = document.getElementById('audioSection');
        const audioPlayer = document.getElementById('audioPlayer');
        const errorBox = document.getElementById('errorBox');

        let audioBlob = null;

        async function generateSpeech() {
            const text = textInput.value.trim();
            if (!text) {
                showError("សូមបញ្ចូលអត្ថបទជាមុនសិន!");
                return;
            }

            setLoading(true);
            errorBox.classList.add('hidden');

            const speedNote = speedSelect.value === 'slow' ? '[slowly] ' : (speedSelect.value === 'fast' ? '[fast] ' : '');
            const promptText = `Say this in Khmer: ${speedNote}${text}`;

            const payload = {
                contents: [{ parts: [{ text: promptText }] }],
                generationConfig: {
                    responseModalities: ["AUDIO"],
                    speechConfig: {
                        voiceConfig: {
                            prebuiltVoiceConfig: {
                                voiceName: voiceSelect.value
                            }
                        }
                    }
                },
                model: "gemini-2.5-flash-preview-tts"
            };

            try {
                const response = await fetchWithRetry(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-tts:generateContent?key=${apiKey}`, payload);
                const result = await response.json();

                if (result.candidates?.[0]?.content?.parts?.[0]?.inlineData) {
                    const audioData = result.candidates[0].content.parts[0].inlineData.data;
                    const mimeType = result.candidates[0].content.parts[0].inlineData.mimeType;

                    // Convert PCM to WAV for playback
                    const audioUrl = pcmToWavUrl(audioData, mimeType);
                    audioPlayer.src = audioUrl;
                    audioSection.classList.remove('hidden');
                    audioPlayer.play();
                } else {
                    throw new Error("មិនអាចបង្កើតសំឡេងបានទេ។ សូមព្យាយាមម្តងទៀត។");
                }
            } catch (err) {
                showError(err.message);
            } finally {
                setLoading(false);
            }
        }

        async function fetchWithRetry(url, payload, retries = 5) {
            for (let i = 0; i < retries; i++) {
                try {
                    const response = await fetch(url, {
                        method: 'POST',
                        body: JSON.stringify(payload)
                    });
                    if (response.ok) return response;
                } catch (e) { }
                await new Promise(res => setTimeout(res, Math.pow(2, i) * 1000));
            }
            throw new Error("ការតភ្ជាប់មានបញ្ហា។ សូមពិនិត្យអ៊ីនធឺណិតរបស់អ្នក។");
        }

        function pcmToWavUrl(base64Data, mimeType) {
            const binaryString = window.atob(base64Data);
            const len = binaryString.length;
            const bytes = new Uint8Array(len);
            for (let i = 0; i < len; i++) {
                bytes[i] = binaryString.charCodeAt(i);
            }

            // Extract Sample Rate from mimeType (e.g., "audio/L16;codec=pcm;rate=24000")
            const sampleRateMatch = mimeType.match(/rate=(\d+)/);
            const sampleRate = sampleRateMatch ? parseInt(sampleRateMatch[1]) : 24000;

            const wavHeader = createWavHeader(len, sampleRate);
            const wavBuffer = new Uint8Array(wavHeader.length + len);
            wavBuffer.set(wavHeader);
            wavBuffer.set(bytes, wavHeader.length);

            const blob = new Blob([wavBuffer], { type: 'audio/wav' });
            audioBlob = blob;
            return URL.createObjectURL(blob);
        }

        function createWavHeader(dataLength, sampleRate) {
            const buffer = new ArrayBuffer(44);
            const view = new DataView(buffer);
            const writeString = (offset, string) => {
                for (let i = 0; i < string.length; i++) {
                    view.setUint8(offset + i, string.charCodeAt(i));
                }
            };

            writeString(0, 'RIFF');
            view.setUint32(4, 36 + dataLength, true);
            writeString(8, 'WAVE');
            writeString(12, 'fmt ');
            view.setUint32(16, 16, true);
            view.setUint16(20, 1, true); // PCM
            view.setUint16(22, 1, true); // Mono
            view.setUint32(24, sampleRate, true);
            view.setUint32(28, sampleRate * 2, true);
            view.setUint16(32, 2, true);
            view.setUint16(34, 16, true);
            writeString(36, 'data');
            view.setUint32(40, dataLength, true);

            return new Uint8Array(buffer);
        }

        function downloadAudio() {
            if (!audioBlob) return;
            const url = URL.createObjectURL(audioBlob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'khmer_ai_voice.wav';
            a.click();
        }

        function showError(msg) {
            errorBox.textContent = msg;
            errorBox.classList.remove('hidden');
        }

        function setLoading(isLoading) {
            if (isLoading) {
                loader.classList.remove('hidden');
                btnText.textContent = "កំពុងបង្កើត...";
                generateBtn.disabled = true;
                generateBtn.classList.add('opacity-70');
            } else {
                loader.classList.add('hidden');
                btnText.textContent = "បង្កើតសំឡេង";
                generateBtn.disabled = false;
                generateBtn.classList.remove('opacity-70');
            }
        }

        generateBtn.addEventListener('click', generateSpeech);
    </script>
</body>

</html>
